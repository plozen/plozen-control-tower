<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLOZEN Control Tower 크몽 커스텀 관리자 대표 썸네일</title>
    <meta
      name="description"
      content="PLOZEN Control Tower 커스텀 관리자와 업무 시스템 크몽 목록용 1200x1200 대표 썸네일"
    />
    <link rel="icon" href="data:," />
    <script>
      if (new URLSearchParams(window.location.search).get("embed")) {
        document.documentElement.dataset.preview = "1";
      }
    </script>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="asset-page">
    <div class="asset-actions">
      <a
        class="download-button download-button--primary"
        href="../../../screenshots/portfolio/kmong/web/plostack-web-main-thumbnail.png?v=20260518-web-kit"
        download="plostack-web-main-thumbnail.png"
      >
        PNG 다운로드
      </a>
      <a class="download-button" href="./">웹 패키지로 돌아가기</a>
    </div>
    <main class="asset-stage" aria-label="1200x1200 웹 대표 썸네일 미리보기">
      <article class="canvas canvas--web-main" aria-labelledby="web-main-title">
        <div class="line-orbit line-orbit--main-one" aria-hidden="true"></div>
        <div class="line-orbit line-orbit--main-two" aria-hidden="true"></div>
        <div class="line-dot line-dot--one" aria-hidden="true"></div>
        <div class="line-dot line-dot--two" aria-hidden="true"></div>

        <header class="web-main-copy">
          <p class="eyebrow">AI CONTROL TOWER</p>
          <h1 id="web-main-title">AI 운영<br />중앙관제</h1>
          <p>신청 · 예약 · 검수 · 승인 · 상태관리까지</p>
        </header>

        <section class="mac-hero-device" aria-label="PLOZEN Control Tower 관리자 웹 PC 화면">
          <article class="mac-device mac-device--hero">
            <div class="mac-screen">
              <div class="browser-topbar">
                <span class="browser-dot-group" aria-hidden="true"><i></i><i></i><i></i></span>
                <span class="browser-address">control.local</span>
              </div>
              <div
                class="mac-viewport"
                data-device-viewport
                data-source-width="1440"
                data-source-height="1040"
              >
                <iframe
                  src="../../../pub/web/index.html"
                  title="PLOZEN Control Tower 관리자 웹 PC 퍼블리싱 화면"
                  loading="eager"
                  scrolling="no"
                ></iframe>
              </div>
            </div>
            <div class="mac-stand" aria-hidden="true"></div>
            <div class="mac-base" aria-hidden="true"></div>
          </article>
        </section>
      </article>
    </main>
    <script>
      const deviceViewports = Array.from(document.querySelectorAll("[data-device-viewport]"));

      const lockIframeScroll = (iframe) => {
        try {
          const doc = iframe.contentDocument;
          if (!doc) return;
          doc.documentElement.style.overflow = "hidden";
          if (doc.body) {
            doc.body.style.overflow = "hidden";
          }
        } catch (error) {
          // Same-origin embeds are expected, but capture should tolerate a future source split.
        }
      };

      const resizeDeviceIframes = () => {
        deviceViewports.forEach((viewport) => {
          const sourceWidth = Number(viewport.dataset.sourceWidth);
          const sourceHeight = Number(viewport.dataset.sourceHeight);
          const iframe = viewport.querySelector("iframe");
          if (!sourceWidth || !sourceHeight || !iframe) return;

          const scale = viewport.clientWidth / sourceWidth;
          viewport.style.setProperty("--web-frame-source-width", `${sourceWidth}px`);
          viewport.style.setProperty("--web-frame-source-height", `${sourceHeight}px`);
          viewport.style.setProperty("--web-frame-scale", String(scale));
          lockIframeScroll(iframe);
        });
      };

      deviceViewports.forEach((viewport) => {
        const iframe = viewport.querySelector("iframe");
        iframe?.addEventListener("load", () => {
          resizeDeviceIframes();
          lockIframeScroll(iframe);
        });
      });

      if ("ResizeObserver" in window) {
        const deviceObserver = new ResizeObserver(resizeDeviceIframes);
        deviceViewports.forEach((viewport) => deviceObserver.observe(viewport));
      }

      window.addEventListener("load", resizeDeviceIframes);
      window.addEventListener("resize", resizeDeviceIframes);
      resizeDeviceIframes();
    </script>
  </body>
</html>
